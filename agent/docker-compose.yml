services:

  # ── Strategy 1: Momentum + Macro Alignment ─────────────────────────────────
  # Starts by default with: docker compose up -d
  agent:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      # Persist agent identity across container restarts.
      # Copy your existing credentials.json here before running setup.sh
      # if you want to keep your current leaderboard account.
      - ./credentials.json:/agent/credentials.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Strategy 2: LLM-Guided Swing ───────────────────────────────────────────
  # docker compose --profile swing up -d
  agent-swing:
    build: .
    env_file: .env.swing
    command: ["python", "main.py", "--env", ".env.swing"]
    restart: unless-stopped
    profiles:
      - swing
    volumes:
      - ./credentials.swing.json:/agent/credentials.swing.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Strategy 3: LLM-Guided Mean Reversion ──────────────────────────────────
  # Contrarian strategy — buys oversold quality stocks, targets 7-14 day bounce.
  # docker compose --profile mean-reversion up -d
  # Run all three: docker compose --profile swing --profile mean-reversion up -d
  agent-mean-reversion:
    build: .
    env_file: .env.mean_reversion
    command: ["python", "main.py", "--env", ".env.mean_reversion"]
    restart: unless-stopped
    profiles:
      - mean-reversion
    volumes:
      - ./credentials.mean_reversion.json:/agent/credentials.mean_reversion.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
